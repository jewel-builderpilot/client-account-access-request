{% extends "base.html" %}
{% block title %}Admin Login — BuilderPilot{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Admin Login</h1>
    <p class="text-sm text-gray-500 mb-6">BuilderPilot Onboarding Dashboard</p>

    <form method="POST" action="{{ url_for('admin.login') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" required autofocus
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-semibold hover:bg-indigo-700 transition">
          Sign In
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
