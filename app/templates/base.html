<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BuilderPilot Onboarding{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
        {% for category, message in messages %}
          <div class="px-4 py-3 rounded-lg shadow text-sm font-medium
            {% if category == 'danger' %}bg-red-100 text-red-800 border border-red-300
            {% elif category == 'success' %}bg-green-100 text-green-800 border border-green-300
            {% else %}bg-blue-100 text-blue-800 border border-blue-300{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block body %}{% endblock %}

</body>
</html>
